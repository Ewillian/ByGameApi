name: Analyze PR with SonarCloud

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - Safe

jobs:
  sonarcloud:
    name: SonarCloud PR Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install coverlet global tool
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud analysis
        run: |
          dotnet sonarscanner begin \
            /k:"Ewillian_ByGameApi" \
            /o:"ewillian" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="tests/Unit/Api/TestResults/Api.coverage.opencover.xml,tests/Unit/Domain/TestResults/Domain.coverage.opencover.xml,tests/Unit/Infrastructure/TestResults/Infra.coverage.opencover.xml" \
            /d:sonar.scanner.skipJreProvisioning=true \
            /d:sonar.exclusions="**/obj/**,**/bin/**,**/*.designer.cs,**/*.g.cs,**/*.g.i.cs,**/*.json,**/*.config,**/*.xml,**/packages/**,**/.nuget/**" \
            /d:sonar.test.exclusions="**/tests/**,**/*.Tests.cs" \
            /d:sonar.scanner.scanAll=false

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test tests/Unit/Api/ByGameApi.Api.Tests.Unit.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/Api.coverage.opencover.xml

          dotnet test tests/Unit/Domain/ByGameApi.Domain.Tests.Unit.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/Domain.coverage.opencover.xml

          dotnet test tests/Unit/Infrastructure/ByGameApi.Infrastructure.Tests.Unit.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/Infra.coverage.opencover.xml

      - name: End SonarCloud analysis
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

  fetchSonarSummary:
    name: Fetch SonarCloud Summary
    runs-on: ubuntu-latest
    needs: sonarcloud

    outputs:
      summary: ${{ steps.extract.outputs.summary }}

    steps:
      - name: Fetch SonarCloud Report
        id: fetch
        run: |
          PROJECT_KEY="Ewillian_ByGameApi"
          ORGANIZATION="ewillian"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"

          # Get the last analysis task ID
          RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "https://sonarcloud.io/api/measures/component?component=$PROJECT_KEY&metricKeys=new_issues,accepted_issues,new_security_hotspots,new_coverage,new_duplications&branch=$BRANCH")

          echo "$RESPONSE" > response.json

      - name: Extract Measures
        id: extract
        run: |
          NEW_ISSUES=$(jq -r '.component.measures[] | select(.metric=="new_issues") | .value' response.json)
          ACCEPTED_ISSUES=$(jq -r '.component.measures[] | select(.metric=="accepted_issues") | .value' response.json)
          SECURITY_HOTSPOTS=$(jq -r '.component.measures[] | select(.metric=="new_security_hotspots") | .value' response.json)
          NEW_COVERAGE=$(jq -r '.component.measures[] | select(.metric=="new_coverage") | .value' response.json)
          NEW_DUPLICATION=$(jq -r '.component.measures[] | select(.metric=="new_duplications") | .value' response.json)

          SUMMARY="Issues: ${NEW_ISSUES} New, ${ACCEPTED_ISSUES} Accepted\nMeasures:\n${SECURITY_HOTSPOTS} Security Hotspots\n${NEW_COVERAGE}% Coverage on New Code\n${NEW_DUPLICATION}% Duplication on New Code"

          echo "$SUMMARY"
          SUMMARY_ESCAPED=$(echo "$SUMMARY" | jq -Rsa .)
          echo "summary=$SUMMARY_ESCAPED" >> $GITHUB_OUTPUT

  notifyDiscord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: always()
    steps:
      - name: Send Discord Notification
        run: |
          STATUS="✅ Build succeeded!"
          if [ "${{ needs.sonarcloud.result }}" != "success" ]; then
            STATUS="❌ Build failed!"
          fi

          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "username": "GitHub Actions",
                 "embeds": [{
                   "title": "🚀 Unity Build Status",
                   "description": "'"$STATUS"'",
                   "color": 16711680,
                   "fields": [
                     {"name": "Branch", "value": "${{ github.ref }}", "inline": false},
                     {"name": "Committer", "value": "${{ github.actor }}", "inline": false},
                     {"name": "Repository", "value": "${{ github.repository }}", "inline": false},
                     {"name": "SonarCloud Summary", "value": '"$SUMMARY"', "inline": false}
                   ]
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}