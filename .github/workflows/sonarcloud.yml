name: Analyze PR with SonarCloud

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - Safe

jobs:
  sonarcloud:
    name: SonarCloud PR Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install coverlet global tool
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud analysis
        run: |
          dotnet sonarscanner begin \
            /k:"Ewillian_ByGameApi" \
            /o:"ewillian" \
            /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="tests/Unit/Api/TestResults/Api.coverage.opencover.xml,tests/Unit/Domain/TestResults/Domain.coverage.opencover.xml,tests/Unit/Infrastructure/TestResults/Infra.coverage.opencover.xml" \
            /d:sonar.scanner.skipJreProvisioning=true \
            /d:sonar.exclusions="**/obj/**,**/bin/**,**/*.designer.cs,**/*.g.cs,**/*.g.i.cs,**/*.json,**/*.config,**/*.xml,**/packages/**,**/.nuget/**" \
            /d:sonar.test.exclusions="**/tests/**,**/*.Tests.cs" \
            /d:sonar.scanner.scanAll=false

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test tests/Unit/Api/ByGameApi.Api.Tests.Unit.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/Api.coverage.opencover.xml

          dotnet test tests/Unit/Domain/ByGameApi.Domain.Tests.Unit.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/Domain.coverage.opencover.xml

          dotnet test tests/Unit/Infrastructure/ByGameApi.Infrastructure.Tests.Unit.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/Infra.coverage.opencover.xml

      - name: End SonarCloud analysis
        run: dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

      - name: Wait for SonarCloud Quality Gate
        run: |
          PROJECT_KEY="Ewillian_ByGameApi"
          ORGANIZATION="ewillian"
          TASK_URL=$(find . -name "report-task.txt" | head -n 1)
          CE_TASK_ID=$(grep 'ceTaskId' $TASK_URL | cut -d'=' -f2)

          echo "Waiting for SonarCloud analysis (taskId=$CE_TASK_ID)..."

          STATUS="PENDING"
          TIMEOUT=60
          COUNT=0

          while [[ "$STATUS" == "PENDING" && $COUNT -lt $TIMEOUT ]]; do
            sleep 5
            RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "https://sonarcloud.io/api/ce/task?id=$CE_TASK_ID")
            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')
            ((COUNT++))
          done

          if [ "$STATUS" != "SUCCESS" ]; then
            echo "SonarCloud analysis failed or timed out."
            exit 1
          fi

          ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId')

          QG_STATUS=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "https://sonarcloud.io/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $QG_STATUS"

          if [ "$QG_STATUS" != "OK" ]; then
            echo "Quality Gate failed."
            exit 1
          fi

  fetchSonarSummary:
    name: Fetch SonarCloud Summary
    runs-on: ubuntu-latest
    needs: [sonarcloud]

    outputs:
      summary: ${{ steps.extract.outputs.summary }}

    steps:
      - name: Fetch SonarCloud Report
        id: fetch
        run: |
          PROJECT_KEY="Ewillian_ByGameApi"
          ORGANIZATION="ewillian"
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Get the last analysis task ID
          RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "https://sonarcloud.io/api/measures/component?component=$PROJECT_KEY&metricKeys=accepted_issues,new_security_hotspots,new_coverage,new_duplicated_lines_density&pullRequest=$PR_NUMBER")

          echo "$RESPONSE" > response.json

      - name: Extract Measures
        id: extract
        run: |
          get_value() {
            jq -r --arg METRIC "$1" '
              if .component and .component.measures then
                (.component.measures[]? | select(.metric==$METRIC) |
                  if has("periods") and (.periods | length > 0) then
                    .periods[0].value
                  else
                    .value
                  end
                ) // "N/A"
              else
                "N/A"
              end
            ' response.json
          }

          ACCEPTED_ISSUES=$(get_value "accepted_issues")
          SECURITY_HOTSPOTS=$(get_value "new_security_hotspots")
          NEW_COVERAGE=$(get_value "new_coverage")
          NEW_DUPLICATION=$(get_value "new_duplicated_lines_density")

          SUMMARY="Total issues, ${ACCEPTED_ISSUES} Accepted\nMeasures:\n${SECURITY_HOTSPOTS} Security Hotspots\n${NEW_COVERAGE}% Coverage on New Code\n${NEW_DUPLICATION}% Duplication on New Code"

          echo "$SUMMARY"
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  notifyDiscord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [sonarcloud, fetchSonarSummary]
    if: always()
    steps:
      - name: Send Discord Notification
        run: |
          STATUS="✅ Build succeeded!"
          COLOR=65280
          if [ "${{ needs.sonarcloud.result }}" != "success" ]; then
            STATUS="❌ Build failed!"
            COLOR=16711680
          fi

          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          SUMMARY="${{ needs.fetchSonarSummary.outputs.summary }}"

          curl -H "Content-Type: application/json" \
              -X POST \
              -d '{
                "username": "GitHub Actions",
                "embeds": [{
                  "title": "🚀 Unity Build Status",
                  "description": "'"$STATUS"'",
                  "color": '"$COLOR"',
                  "fields": [
                    {"name": "Branch", "value": "'"${BRANCH_NAME}"'", "inline": false},
                    {"name": "Committer", "value": "'"${GITHUB_ACTOR}"'", "inline": false},
                    {"name": "Repository", "value": "'"${GITHUB_REPOSITORY}"'", "inline": false},
                    {"name": "SonarCloud Summary", "value": "```'"${SUMMARY//$'\n'/\\n}"'```", "inline": false},
                    {"name": "Lien PR", "value": "https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}", "inline": false},
                    {"name": "SonarCloud", "value": "https://sonarcloud.io/project/overview?id=Ewillian_ByGameApi", "inline": false}
                  ]
                }]
              }' \
              ${{ secrets.DISCORD_WEBHOOK_URL }}